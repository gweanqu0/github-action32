name: Demo Workflow

on:
    push:
        branches:
            - main
            - dev
    pull_request:
        branches:
            -main
            - dev
    schedule:
        - cron: "*/1 * * * *"             

jobs:
    setup_job:
       runs-on: ubuntu-latest # mac-os-latest, windows-latest
       steps:
        - name: create file
          run: touch github-action32.txt
        - name: print hello world
          run: echo "Hello World"
        - name: desplay readme file
          run: cat README.md 
         
    build_job:
        runs-on: windows-latest
        steps: 
            - name: display hello
              run: echo hello 

       
    deploy_job:
        runs-on: macos-latest
        steps:
            - run: echo hello mac
       


